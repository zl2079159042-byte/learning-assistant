# Render 部署配置
services:
  - type: web
    name: learning-assistant-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEFAULT_MODEL
        value: deepseek
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./learning.db
    plan: free
